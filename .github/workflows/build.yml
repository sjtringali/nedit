name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: gcc:latest

    steps:
      - name: Install build dependencies
        run: apt-get update && apt-get install -y libmotif-dev libxt-dev libx11-dev

      - uses: actions/checkout@v4

      - name: Create legacy X11R6 paths
        run: ln -s /usr /usr/X11R6

      - name: Build
        run: make linux

  mirror:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan git.code.sf.net >> ~/.ssh/known_hosts

      - name: Mirror to SourceForge
        run: |
          git remote add sf ssh://tringali@git.code.sf.net/p/nedit/git

          GIT_SSH_COMMAND="ssh -v -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            git push sf --mirror && git push sf --tags
